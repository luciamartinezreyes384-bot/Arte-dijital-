<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Artes Digitales</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>🎨 Galería de Artes Digitales</h1>
        <p>Explora la creatividad visual</p>
    </header>

    <main>
        <!-- Contenedor para las 4 imágenes -->
        <div class="gallery-container">
            <div class="art-item">
                <img src="images (1).jpeg" alt="Arte Digital 1">
                <div class="overlay">Diseño Conceptual</div>
            </div>
            <div class="art-item">
                <img src="images.jpeg" alt="Arte Digital 2">
                <div class="overlay">Ilustración 2D</div>
            </div>
            <div class="art-item">
                <img src="images (2).jpeg" alt="Arte Digital 3">
                <div class="overlay">Modelado 3D</div>
            </div>
            <div class="art-item">
                <img src="images (1).jpeg" alt="Arte Digital 4">
                <div class="overlay">Arte Abstracto</div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 - Portafolio de Artes Digitales</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
