<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artes Digitales | Creatividad y Tecnología</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Fuente de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navegación -->
    <nav id="navbar">
        <div class="logo">ArteDigital<span>.</span></div>
        <ul class="nav-links">
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#galeria">Galería</a></li>
            <li><a href="#tecnicas">Técnicas</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
        <div class="burger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <!-- Sección Hero -->
    <section id="inicio" class="hero">
        <div class="hero-content">
            <h1>Explora el mundo de las <span>Artes Digitales</span></h1>
            <p>Donde la imaginación se encuentra con la tecnología.</p>
            <button class="cta-btn">Conocer más</button>
        </div>
        <div class="hero-image">
            <div class="glow-effect"></div>
        </div>
    </section>

    <!-- Sección Galería -->
    <section id="galeria" class="gallery-section">
        <h2>Galería Creativa</h2>
        <div class="gallery-grid">
            <div class="gallery-item" style="background: linear-gradient(45deg, #ff9a9e, #fad0c4);">Ilustración</div>
            <div class="gallery-item" style="background: linear-gradient(45deg, #a18cd1, #fbc2eb);">3D Modeling</div>
            <div class="gallery-item" style="background: linear-gradient(45deg, #84fab0, #8fd3f4);">Fotomanipulación</div>
            <div class="gallery-item" style="background: linear-gradient(45deg, #fa709a, #fee140);">Pixel Art</div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="contacto">
        <p>&copy; 2024 Artes Digitales. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
